<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIKTANYA BUILD — Всё для дома и ремонта</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: #007070; background-image: linear-gradient(115deg, transparent 20%, rgba(212, 175, 55, 0.4) 21%, rgba(212, 175, 55, 0.4) 22%, transparent 23%), linear-gradient(25deg, transparent 70%, rgba(212, 175, 55, 0.3) 71%, rgba(212, 175, 55, 0.3) 72%, transparent 73%), radial-gradient(circle at 30% 30%, rgba(0, 180, 180, 0.6) 0%, transparent 60%), linear-gradient(135deg, #008b8b 0%, #003a3a 100%); background-blend-mode: screen, screen, soft-light, normal; overflow-x: hidden; }
        .nav-panel { position: fixed; top: 0; width: 100%; background: #000; padding: 15px 0; text-align: center; z-index: 999; border-bottom: 2px solid #2ecc71; }
        .back-btn { background: #2ecc71; color: #000; padding: 12px 40px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; box-shadow: 0 0 20px #2ecc71; }
        #main-container { width: 100%; min-height: 100vh; margin-top: 70px; background: #fff; }
        #build-modal { display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background-color: #005a5a; background-image: linear-gradient(135deg, transparent 40%, #d4af37 41%, #d4af37 42%, transparent 43%), radial-gradient(circle, rgba(0, 150, 150, 0.9) 0%, rgba(0, 30, 30, 0.98) 100%); background-blend-mode: screen, normal; z-index: 10000; justify-content:center; align-items:center; backdrop-filter: blur(15px); transition: 0.6s; }
        .modal-content { display: flex; flex-direction: column; gap: 25px; max-width: 550px; width: 92%; text-align: center; }
        .build-btn { display:flex; flex-direction:column; justify-content:center; align-items:center; height:160px; color:#fff !important; text-decoration:none; border-radius:40px; font-weight:900; font-size:1.8em; background: rgba(0, 0, 0, 0.7); border: 3px solid #2ecc71; cursor: pointer; }
        .build-btn span.subtext { font-size: 0.45em; margin-top: 10px; color: #d4af37; letter-spacing: 2px; text-transform: uppercase; }
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="nav-panel"><button class="back-btn" onclick="resetMenu()">🏠 МЕНЮ СТРОЙКИ</button></div>
    <div id="main-container">
        <iframe src="https://ppdu.ru/55b9b8e0-dbf5-4aa3-80ad-9ff085f0569e" style="width: 100%; border: none; min-height: 1000px;" id="ppdwiOffer" scrolling="no"></iframe>
        <script src="https://b2c.pampadu.ru/ppdw.js"></script>
    </div>
    <div id="build-modal">
        <div class="modal-content">
            <h1 style="color:white; letter-spacing:5px;">VIKTANYA BUILD</h1>
            <div onclick="animateExit()" class="build-btn">🧱 СТРОЙМАТЕРИАЛЫ <span class="subtext">ИНСТРУМЕНТЫ И РЕМОНТ</span></div>
            <div onclick="animateExit()" class="build-btn">📡 ИНТЕРНЕТ <span class="subtext">СВЯЗЬ В НОВЫЙ ДОМ</span></div>
        </div>
    </div>
    <script>
        function animateExit() { document.getElementById('build-modal').classList.add('fade-out'); setTimeout(() => { document.getElementById('build-modal').style.display = 'none'; }, 600); }
        function resetMenu() { const modal = document.getElementById('build-modal'); modal.style.display = 'flex'; modal.classList.remove('fade-out'); }
    </script>
</body>
</html>
